<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="theme-color" content="#FAF8F4"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>

<title>CasaLimpa</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
<script>

const bl=new Blob([JSON.stringify(md)],{type:"application/json"});
const lk=document.createElement("link");lk.rel="manifest";lk.href=URL.createObjectURL(bl);document.head.appendChild(lk);
</script>
<style>
:root{
  --bg:#FAF8F4;
  --bg2:#F3F0EA;
  --bg3:#EAE5DC;
  --text:#2C2416;
  --text2:#7A6E60;
  --text3:#B5A898;
  --accent:#5C7A5C;    /* verde sálvia */
  --accent2:#C4683A;   /* terracota */
  --accent3:#8B6914;   /* âmbar */
  --border:#DDD8CE;
  --border2:#EAE5DC;
  --card:#FFFFFF;
  --shadow:0 1px 4px rgba(44,36,22,.08);
  --shadow2:0 4px 20px rgba(44,36,22,.12);
  --radius:14px;
  --radius-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Lato',sans-serif;min-height:100vh;overflow-x:hidden;}
button,input,select{font-family:'Lato',sans-serif;cursor:pointer;}
h1,h2,h3,.display{font-family:'Playfair Display',serif;}

/* Loading */
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:200;}
.loading-logo{font-size:48px;}
.loading-txt{color:var(--text3);font-size:13px;letter-spacing:2px;text-transform:uppercase;}

/* ── LOGIN ── */
#login-screen{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 28px;background:var(--bg);position:relative;z-index:1;}
.lg-brand{text-align:center;margin-bottom:48px;}
.lg-logo{font-size:52px;margin-bottom:12px;}
.lg-title{font-family:'Playfair Display',serif;font-size:32px;color:var(--text);margin-bottom:4px;}
.lg-sub{color:var(--text3);font-size:13px;letter-spacing:1.5px;text-transform:uppercase;}
.lg-btns{display:flex;flex-direction:column;gap:12px;width:100%;max-width:320px;}
.lg-btn{display:flex;align-items:center;gap:16px;padding:18px 20px;border-radius:var(--radius);border:1.5px solid var(--border);background:var(--card);text-align:left;box-shadow:var(--shadow);}
.lg-btn-icon{font-size:28px;flex-shrink:0;}
.lg-btn-text{}
.lg-btn-lbl{font-size:15px;font-weight:700;color:var(--text);display:block;}
.lg-btn-sub{font-size:12px;color:var(--text3);display:block;margin-top:2px;}
.lg-btn-a{border-color:var(--accent);background:#F0F5F0;}
.lg-btn-i{border-color:var(--accent2);background:#FBF3EE;}
.pin-section{width:100%;max-width:320px;display:none;margin-top:8px;}
.pin-lbl{color:var(--text2);font-size:13px;margin-bottom:10px;text-align:center;}
.pin-inp{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);color:var(--text);padding:14px;font-size:22px;text-align:center;letter-spacing:10px;outline:none;}
.pin-inp:focus{border-color:var(--accent);}
.pin-inp.err{border-color:var(--accent2);}
.pin-err{display:none;color:var(--accent2);font-size:12px;text-align:center;margin-top:6px;}
.pin-hint{color:var(--text3);font-size:11px;text-align:center;margin-top:10px;}
.pin-actions{display:flex;gap:10px;margin-top:14px;}

/* ── SCREENS ── */
.screen{display:none;flex-direction:column;min-height:100vh;background:var(--bg);}
.screen.active{display:flex;}

/* ── TOPBAR ── */
.topbar{display:flex;justify-content:space-between;align-items:center;padding:16px 20px 12px;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0;}
.tb-brand{display:flex;align-items:center;gap:10px;}
.tb-logo{font-size:24px;}
.tb-name{font-family:'Playfair Display',serif;font-size:20px;color:var(--text);}
.tb-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
.today-badge{font-size:11px;color:var(--text2);letter-spacing:.3px;}
.tb-meta{display:flex;align-items:center;gap:8px;}
.role-pill{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 8px;border-radius:20px;}
.rp-a{background:#E8F0E8;color:var(--accent);}
.rp-i{background:#FAEEE8;color:var(--accent2);}
.sync-dot{font-size:12px;color:var(--accent3);display:none;}
.logout-btn{background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--text3);font-size:11px;padding:3px 8px;}

/* ── TABS ── */
.tabs{display:flex;padding:0 20px;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0;gap:0;}
.tab{background:transparent;border:none;border-bottom:2px solid transparent;color:var(--text3);padding:10px 14px;font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}

/* ── SCROLLER ── */
.scroller{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 20px 100px;}

/* ── DAY BAR ── */
.day-bar{display:flex;gap:6px;margin-bottom:20px;overflow-x:auto;padding-bottom:4px;}
.day-btn{position:relative;background:var(--card);border:1.5px solid var(--border);border-radius:10px;color:var(--text3);padding:9px 8px;min-width:46px;text-align:center;overflow:hidden;flex-shrink:0;box-shadow:var(--shadow);}
.day-btn.active{border-color:var(--accent);color:var(--accent);background:#F0F5F0;}
.day-btn.today{background:#FFFBF0;}
.day-lbl{display:block;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;}
.day-cnt{display:block;font-size:10px;margin-top:2px;}
.day-prog{position:absolute;bottom:0;left:0;height:2px;background:var(--accent);}

/* ── PROGRESS ── */
.prog-sec{margin-bottom:20px;}
.prog-hdr{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
.prog-lbl{font-family:'Playfair Display',serif;font-size:20px;}
.prog-pct{font-size:12px;color:var(--text3);font-weight:700;letter-spacing:.5px;}
.prog-track{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;border-radius:2px;transition:width .5s,background .5s;}

/* ── ROOM CARD ── */
.rc{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow);}
.rch{display:flex;align-items:center;gap:10px;padding:12px 16px;border-left:3px solid;}
.rci{font-size:18px;}
.rcn{font-weight:700;flex:1;font-size:14px;color:var(--text);}
.rbadge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;}
.tlist{padding:4px 12px;}
.ti{display:flex;align-items:center;gap:12px;padding:10px 4px;border-bottom:1px solid var(--border2);cursor:pointer;user-select:none;}
.ti:last-child{border-bottom:none;}
.ti.done{opacity:.45;}
.chk{width:20px;height:20px;border-radius:5px;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
.chk.checked{border-color:transparent;}
.ckm{color:#fff;font-size:11px;font-weight:700;}
.tn{font-size:13px;flex:1;color:var(--text);}
.ti.done .tn{text-decoration:line-through;color:var(--text3);}
.tdesc{display:block;font-size:11px;color:var(--text3);margin-top:2px;line-height:1.4;font-style:italic;}
.del-btn{background:transparent;border:none;color:var(--text3);font-size:18px;padding:0 2px;line-height:1;}

/* ── EMPTY ── */
.empty{text-align:center;padding:60px 20px;}
.empty-ic{font-size:44px;margin-bottom:12px;}
.empty-tx{color:var(--text3);font-size:14px;line-height:1.6;}

/* ── ROOM GRID ── */
.room-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.room-tile{background:var(--card);border:1px solid var(--border);border-top:3px solid;border-radius:var(--radius);padding:14px;cursor:pointer;position:relative;box-shadow:var(--shadow);}
.rta{position:absolute;top:8px;right:8px;}
.rta-btn{background:var(--bg2);border:none;border-radius:6px;font-size:13px;padding:3px 6px;color:var(--text2);}
.rti{font-size:26px;margin:6px 0 8px;}
.rtn{font-weight:700;font-size:14px;margin-bottom:5px;color:var(--text);}
.rts{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);}
.add-tile{background:var(--bg2);border:1.5px dashed var(--border);border-radius:var(--radius);padding:20px 14px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;}
.add-tile-ic{font-size:26px;color:var(--text3);}
.add-tile-lbl{color:var(--text3);font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;}

/* ── ROOM DETAIL ── */
.rdh{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:var(--radius);margin-bottom:14px;border-left:4px solid;}
.rdhic{font-size:30px;}
.rdhtl{font-family:'Playfair Display',serif;font-size:20px;}
.wdb{margin-bottom:18px;}
.wdl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.today-tag{background:var(--accent3);color:#fff;border-radius:20px;padding:1px 7px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}

/* ── WEEK ── */
.week-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.wc{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;cursor:pointer;box-shadow:var(--shadow);}
.wc.today{border-color:var(--accent3);background:#FFFBF0;}
.wcd{font-weight:700;font-size:13px;margin-bottom:4px;display:flex;align-items:center;gap:6px;}
.tdot{color:var(--accent3);font-size:9px;}
.wcc{font-size:11px;color:var(--text3);margin-bottom:8px;}
.wbt{height:3px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-bottom:4px;}
.wbf{height:100%;border-radius:2px;}
.wcr{font-size:11px;color:var(--text2);font-weight:700;margin-bottom:6px;}
.wri{font-size:14px;display:flex;gap:3px;flex-wrap:wrap;}

/* ── FAB ── */
.fab{position:fixed;bottom:28px;right:22px;width:54px;height:54px;border-radius:50%;background:var(--accent);border:none;color:#fff;font-size:26px;box-shadow:0 4px 16px rgba(92,122,92,.4);z-index:10;display:flex;align-items:center;justify-content:center;}

/* ── FORM SCREENS ── */
.form-topbar{display:flex;align-items:center;gap:12px;padding:14px 20px;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0;}
.form-back{background:transparent;border:none;color:var(--accent);font-size:22px;padding:0;line-height:1;}
.form-title{font-family:'Playfair Display',serif;font-size:18px;flex:1;color:var(--text);}
.save-btn{background:var(--accent);border:none;border-radius:var(--radius-sm);color:#fff;font-size:13px;font-weight:700;padding:9px 18px;letter-spacing:.3px;}

.form-scroller{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:24px 20px 80px;}
.form-group{margin-bottom:24px;}
.form-lbl{display:block;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:8px;}
.form-inp{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);color:var(--text);padding:13px 16px;font-size:15px;outline:none;}
.form-inp:focus{border-color:var(--accent);}
.form-sel{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);color:var(--text);padding:13px 16px;font-size:15px;outline:none;appearance:none;}
.form-sel:focus{border-color:var(--accent);}

.days-grid{display:flex;gap:8px;flex-wrap:wrap;}
.day-tog{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text3);padding:10px 11px;font-size:12px;font-weight:700;min-width:46px;text-align:center;letter-spacing:.3px;}
.day-tog.on{background:var(--accent);border-color:var(--accent);color:#fff;}

.icon-grid{display:flex;gap:8px;flex-wrap:wrap;}
.icon-pick{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:22px;padding:8px 10px;}
.icon-pick.on{border-width:2px;}

.color-grid{display:flex;gap:8px;flex-wrap:wrap;}
.color-pick{width:34px;height:34px;border-radius:50%;border:2.5px solid transparent;display:flex;align-items:center;justify-content:center;}
.color-pick.on{outline:2px solid var(--text);outline-offset:2px;}
.cck{color:#fff;font-size:12px;font-weight:700;text-shadow:0 1px 2px rgba(0,0,0,.3);}

.prev-card{display:flex;align-items:center;gap:12px;background:var(--card);border-radius:var(--radius);padding:14px 16px;border-left:4px solid var(--accent);box-shadow:var(--shadow);}
.prev-nm{font-weight:700;font-size:15px;}

.danger-zone{margin-top:8px;padding-top:24px;border-top:1px solid var(--border2);}
.danger-btn{width:100%;background:transparent;border:1.5px solid #E07060;border-radius:var(--radius);color:#C04030;padding:13px;font-size:14px;font-weight:700;}
.confirm-box{background:#FEF5F5;border:1px solid #F0C0B8;border-radius:var(--radius);padding:16px;margin-top:12px;display:none;}
.confirm-box.show{display:block;}
.confirm-txt{color:#7A3020;font-size:13px;text-align:center;margin-bottom:14px;line-height:1.6;}

/* ── BUTTONS ── */
.btn-row{display:flex;gap:10px;}
.btn-ghost{flex:1;background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--radius);color:var(--text2);padding:12px;font-size:13px;font-weight:700;}
.btn-primary{flex:1;background:var(--accent);border:none;border-radius:var(--radius);color:#fff;padding:12px;font-size:13px;font-weight:700;}
.btn-danger{flex:1;background:#C04030;border:none;border-radius:var(--radius);color:#fff;padding:12px;font-size:13px;font-weight:700;}

/* ── ADD TASK BTN ── */
.add-task-btn{width:100%;background:var(--bg2);border:1.5px dashed var(--border);border-radius:var(--radius);color:var(--accent);padding:13px;font-size:13px;font-weight:700;margin-top:10px;letter-spacing:.3px;}
</style>
</head>
<body>

<div id="loading">
  <div class="loading-logo">🧹</div>
  <div class="loading-txt">Carregando</div>
</div>

<div id="login-screen"></div>

<!-- MAIN -->
<div class="screen" id="screen-main">
  <div class="topbar">
    <div class="tb-brand">
      <div class="tb-logo">🧹</div>
      <div class="tb-name">CasaLimpa</div>
    </div>
    <div class="tb-right">
      <div class="today-badge" id="today-badge"></div>
      <div class="tb-meta">
        <span class="role-pill" id="role-pill"></span>
        <span class="sync-dot" id="sync-dot">↻</span>
        <button class="logout-btn" onclick="doLogout()">Sair</button>
      </div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" id="tab-day" onclick="sv('day')">Por Dia</button>
    <button class="tab" id="tab-room" onclick="sv('room')">Cômodos</button>
    <button class="tab" id="tab-week" onclick="sv('week')">Semana</button>
  </div>
  <div class="scroller" id="main-content"></div>
  <button class="fab" id="fab-btn" onclick="goAddTask()" style="display:none">+</button>
</div>

<!-- TASK FORM -->
<div class="screen" id="screen-task">
  <div class="form-topbar">
    <button class="form-back" onclick="goBack()">←</button>
    <span class="form-title" id="task-form-title">Nova Tarefa</span>
    <button class="save-btn" onclick="saveTask()">Salvar</button>
  </div>
  <div class="form-scroller">
    <div class="form-group">
      <label class="form-lbl">Nome da tarefa</label>
      <input class="form-inp" id="tf-name" placeholder="Ex: Aspirar o sofá"/>
    </div>
    <div class="form-group">
      <label class="form-lbl">Cômodo</label>
      <select class="form-sel" id="tf-room"></select>
    </div>
    <div class="form-group">
      <label class="form-lbl">Dias da semana</label>
      <div class="days-grid" id="tf-days"></div>
    </div>
    <div class="form-group">
      <label class="form-lbl">Descrição <span style="color:var(--text3);font-weight:400;text-transform:none;letter-spacing:0">(opcional)</span></label>
      <textarea class="form-inp" id="tf-desc" placeholder="Ex: Usar o pano amarelo, não esquecer atrás do fogão…" rows="4" style="resize:none;line-height:1.5"></textarea>
    </div>
  </div>
</div>

<!-- ROOM FORM -->
<div class="screen" id="screen-room-form">
  <div class="form-topbar">
    <button class="form-back" onclick="goBack()">←</button>
    <span class="form-title" id="room-form-title">Novo Cômodo</span>
    <button class="save-btn" onclick="saveRoom()">Salvar</button>
  </div>
  <div class="form-scroller">
    <div class="form-group">
      <label class="form-lbl">Nome do cômodo</label>
      <input class="form-inp" id="rf-name" placeholder="Ex: Escritório" oninput="uprev()"/>
    </div>
    <div class="form-group">
      <label class="form-lbl">Ícone</label>
      <div class="icon-grid" id="rf-icons"></div>
    </div>
    <div class="form-group">
      <label class="form-lbl">Cor</label>
      <div class="color-grid" id="rf-colors"></div>
    </div>
    <div class="form-group">
      <label class="form-lbl">Pré-visualização</label>
      <div class="prev-card" id="rf-prev">
        <span id="prev-ic" style="font-size:24px">🏠</span>
        <span class="prev-nm" id="prev-nm">Nome do cômodo</span>
      </div>
    </div>
    <div class="danger-zone" id="rf-danger" style="display:none">
      <button class="danger-btn" onclick="toggleConfirmDelete()">🗑️ Excluir este cômodo</button>
      <div class="confirm-box" id="confirm-del-box">
        <p class="confirm-txt" id="confirm-del-txt"></p>
        <div class="btn-row">
          <button class="btn-ghost" onclick="toggleConfirmDelete()">Cancelar</button>
          <button class="btn-danger" onclick="delRoomDo()">Excluir</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ROOM DETAIL -->
<div class="screen" id="screen-room-detail">
  <div class="form-topbar">
    <button class="form-back" onclick="goBack()">←</button>
    <span class="form-title" id="rd-title"></span>
    <button class="save-btn" id="rd-edit-btn" onclick="goEditRoom(selRoom)" style="background:var(--bg2);color:var(--text2);border:1px solid var(--border);">Editar</button>
  </div>
  <div class="scroller" id="room-detail-content"></div>
  <button class="fab" id="rd-fab" onclick="goAddTaskRoom(selRoom)" style="display:none">+</button>
</div>

<script>
const SB_URL="https://nyftyoptskuybbiqkflv.supabase.co";
const SB_KEY="sb_publishable_AlnSMyFJSTYWmvoYioIYwQ_HrJaoQSW";
const ADMIN_PIN="1234";
const DAYS=["Seg","Ter","Qua","Qui","Sex","Sáb","Dom"];
const DAYS_FULL=["Segunda","Terça","Quarta","Quinta","Sexta","Sábado","Domingo"];
const PAL=["#5C7A5C","#C4683A","#8B6914","#4A7A8A","#7A5C8A","#C4904A","#3A7A6A","#8A4A4A","#4A5C8A","#7A7A3A"];
const ICONS=["🛋️","🍳","🛏️","🚿","🧺","🏠","🪟","🏡","🚪","🧹","🪴","🖥️","🎮","📚","🧸","🐾","🚗","🏋️","🌿","🧴"];
const TDI=new Date().getDay()===0?6:new Date().getDay()-1;
const TDD=new Date().toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit"});
const TDS=new Date().toISOString().slice(0,10);
const SEED_R=[{id:"sala",name:"Sala",icon:"🛋️",color:"#5C7A5C"},{id:"cozinha",name:"Cozinha",icon:"🍳",color:"#C4683A"},{id:"quarto",name:"Quarto",icon:"🛏️",color:"#4A7A8A"},{id:"banheiro",name:"Banheiro",icon:"🚿",color:"#3A7A6A"},{id:"lavanderia",name:"Lavanderia",icon:"🧺",color:"#7A5C8A"}];
const SEED_T=[{id:"t1",room_id:"sala",name:"Aspirar o sofá",days:[0,3]},{id:"t2",room_id:"sala",name:"Limpar mesa de centro",days:[1,4]},{id:"t3",room_id:"sala",name:"Varrer o chão",days:[0,2,4]},{id:"t4",room_id:"sala",name:"Passar pano no chão",days:[1,5]},{id:"t5",room_id:"cozinha",name:"Lavar louça",days:[0,1,2,3,4,5,6]},{id:"t6",room_id:"cozinha",name:"Limpar fogão",days:[1,4,6]},{id:"t7",room_id:"cozinha",name:"Passar pano na pia",days:[0,2,4,6]},{id:"t8",room_id:"cozinha",name:"Limpar geladeira",days:[5]},{id:"t9",room_id:"quarto",name:"Fazer a cama",days:[0,1,2,3,4,5,6]},{id:"t10",room_id:"quarto",name:"Varrer o chão",days:[2,5]},{id:"t11",room_id:"quarto",name:"Trocar lençóis",days:[5]},{id:"t12",room_id:"quarto",name:"Organizar guarda-roupa",days:[6]},{id:"t13",room_id:"banheiro",name:"Limpar vaso sanitário",days:[1,4,6]},{id:"t14",room_id:"banheiro",name:"Esfregar o box",days:[3,6]},{id:"t15",room_id:"banheiro",name:"Limpar pia",days:[1,3,5]},{id:"t16",room_id:"banheiro",name:"Trocar toalhas",days:[3,6]},{id:"t17",room_id:"lavanderia",name:"Lavar roupas",days:[1,4]},{id:"t18",room_id:"lavanderia",name:"Estender roupas",days:[1,4]},{id:"t19",room_id:"lavanderia",name:"Dobrar e guardar",days:[3,6]}];

let role=null,rooms=[],tasks=[],smap={};
let view="day",selDay=TDI,selRoom=null,syncing=false,poll=null;
let taskFormMode="add",taskFormData={id:null,name:"",roomId:"",days:[]};
let roomFormMode="add",roomFormData={id:null,name:"",icon:"🏠",color:PAL[0]};
let backScreen="screen-main";

async function sb(path,opts={}){
  const r=await fetch(`${SB_URL}/rest/v1/${path}`,{headers:{apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`,"Content-Type":"application/json",Prefer:opts.prefer??"return=representation"},...opts});
  const t=await r.text();if(!r.ok)throw new Error(t);return t?JSON.parse(t):[];
}
async function loadAll(){
  const[r,t,s]=await Promise.all([sb("rooms?order=created_at"),sb("tasks?order=created_at"),sb(`task_status?date=eq.${TDS}&select=task_id,day_index,completed`)]);
  rooms=r;tasks=t;smap={};s.forEach(x=>{smap[`${x.task_id}_${x.day_index}`]=x.completed;});
}
async function seedIfEmpty(){
  const ex=await sb("rooms?select=id");
  if(!ex.length){await sb("rooms",{method:"POST",prefer:"resolution=ignore",body:JSON.stringify(SEED_R)});await sb("tasks",{method:"POST",prefer:"resolution=ignore",body:JSON.stringify(SEED_T)});}
}

function showScreen(id){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));document.getElementById(id).classList.add("active");}
function goBack(){showScreen(backScreen);if(backScreen==="screen-room-detail")renderRoomDetail();}
function tfd(day){return rooms.flatMap(r=>tasks.filter(t=>t.room_id===r.id&&t.days.includes(day)).map(t=>({...t,rc:r.color})));}
function rate(day){const ts=tfd(day);if(!ts.length)return 0;return Math.round(ts.filter(t=>smap[`${t.id}_${day}`]).length/ts.length*100);}
function roomById(id){return rooms.find(r=>r.id===id);}
function setSyncDot(v){const el=document.getElementById("sync-dot");if(el)el.style.display=v?"inline":"none";}

async function toggleTask(tid,di){
  const k=`${tid}_${di}`,cur=!!smap[k];
  smap[k]=!cur;renderMain();if(selRoom&&document.getElementById("screen-room-detail").classList.contains("active"))renderRoomDetail();
  syncing=true;setSyncDot(true);
  try{await sb("task_status",{method:"POST",prefer:"resolution=merge-duplicates",body:JSON.stringify({id:`${tid}_${di}_${TDS}`,task_id:tid,day_index:di,date:TDS,completed:!cur,updated_at:new Date().toISOString()})});}
  catch(e){smap[k]=cur;renderMain();}
  syncing=false;setSyncDot(false);
}

async function delTask(tid){
  if(!confirm("Excluir esta tarefa?"))return;
  await sb(`tasks?id=eq.${tid}`,{method:"DELETE",prefer:""});
  await loadAll();renderMain();if(selRoom)renderRoomDetail();
}

function goAddTask(){
  taskFormMode="add";taskFormData={id:null,name:"",roomId:"",days:[],description:""};
  backScreen="screen-main";
  document.getElementById("task-form-title").textContent="Nova Tarefa";
  document.getElementById("tf-name").value="";
  document.getElementById("tf-desc").value="";
  const sel=document.getElementById("tf-room");
  sel.innerHTML=`<option value="">Selecione o cômodo</option>`+rooms.map(r=>`<option value="${r.id}">${r.icon} ${r.name}</option>`).join("");
  renderTfDays();showScreen("screen-task");
  setTimeout(()=>document.getElementById("tf-name").focus(),200);
}
function goAddTaskRoom(rid){
  taskFormMode="add";taskFormData={id:null,name:"",roomId:rid,days:[],description:""};
  backScreen="screen-room-detail";
  document.getElementById("task-form-title").textContent="Nova Tarefa";
  document.getElementById("tf-name").value="";
  document.getElementById("tf-desc").value="";
  const sel=document.getElementById("tf-room");
  sel.innerHTML=`<option value="">Selecione o cômodo</option>`+rooms.map(r=>`<option value="${r.id}">${r.icon} ${r.name}</option>`).join("");
  sel.value=rid;
  renderTfDays();showScreen("screen-task");
  setTimeout(()=>document.getElementById("tf-name").focus(),200);
}
function renderTfDays(){
  document.getElementById("tf-days").innerHTML=DAYS.map((d,i)=>
    `<button class="day-tog${taskFormData.days.includes(i)?" on":""}" onclick="toggleTfDay(${i})">${d}</button>`
  ).join("");
}
function toggleTfDay(i){
  taskFormData.days=taskFormData.days.includes(i)?taskFormData.days.filter(x=>x!==i):[...taskFormData.days,i];
  renderTfDays();
}
async function saveTask(){
  const name=document.getElementById("tf-name").value.trim();
  const roomId=document.getElementById("tf-room").value;
  const description=document.getElementById("tf-desc").value.trim();
  if(!name||!roomId||!taskFormData.days.length){alert("Preencha nome, cômodo e pelo menos um dia.");return;}
  if(taskFormMode==="add"){await sb("tasks",{method:"POST",body:JSON.stringify({id:"t"+Date.now(),room_id:roomId,name,days:taskFormData.days,description})});}
  else{await sb(`tasks?id=eq.${taskFormData.id}`,{method:"PATCH",body:JSON.stringify({name,room_id:roomId,days:taskFormData.days,description})});}
  await loadAll();goBack();renderMain();
}

function goAddRoom(){
  roomFormMode="add";roomFormData={id:null,name:"",icon:"🏠",color:PAL[rooms.length%PAL.length]};
  backScreen="screen-main";
  document.getElementById("room-form-title").textContent="Novo Cômodo";
  document.getElementById("rf-name").value="";
  document.getElementById("rf-danger").style.display="none";
  document.getElementById("confirm-del-box").classList.remove("show");
  renderRfIcons();renderRfColors();uprev();
  showScreen("screen-room-form");
  setTimeout(()=>document.getElementById("rf-name").focus(),200);
}
function goEditRoom(rid){
  const r=roomById(rid);
  roomFormMode="edit";roomFormData={id:r.id,name:r.name,icon:r.icon,color:r.color};
  backScreen=selRoom?"screen-room-detail":"screen-main";
  document.getElementById("room-form-title").textContent="Editar Cômodo";
  document.getElementById("rf-name").value=r.name;
  const tc=tasks.filter(t=>t.room_id===r.id).length;
  document.getElementById("rf-danger").style.display="block";
  document.getElementById("confirm-del-box").classList.remove("show");
  document.getElementById("confirm-del-txt").innerHTML=`Excluir <strong>${r.name}</strong>?${tc>0?`<br>As ${tc} tarefa(s) serão removidas permanentemente.`:""}`;
  renderRfIcons();renderRfColors();uprev();
  showScreen("screen-room-form");
}
function renderRfIcons(){
  document.getElementById("rf-icons").innerHTML=ICONS.map(ic=>
    `<button class="icon-pick${roomFormData.icon===ic?" on":""}" style="border-color:${roomFormData.icon===ic?roomFormData.color:"var(--border)"};border-width:${roomFormData.icon===ic?"2px":"1.5px"}" onclick="pickIcon('${ic}')">${ic}</button>`
  ).join("");
}
function renderRfColors(){
  document.getElementById("rf-colors").innerHTML=PAL.map(c=>
    `<button class="color-pick${roomFormData.color===c?" on":""}" style="background:${c}" onclick="pickColor('${c}')">${roomFormData.color===c?`<span class="cck">✓</span>`:""}</button>`
  ).join("");
}
function pickIcon(ic){roomFormData.icon=ic;renderRfIcons();uprev();}
function pickColor(c){roomFormData.color=c;renderRfColors();renderRfIcons();uprev();}
function uprev(){
  roomFormData.name=document.getElementById("rf-name").value;
  const p=document.getElementById("rf-prev"),nm=document.getElementById("prev-nm"),ic=document.getElementById("prev-ic");
  p.style.borderLeftColor=roomFormData.color;
  nm.style.color=roomFormData.color;nm.textContent=roomFormData.name||"Nome do cômodo";
  ic.textContent=roomFormData.icon;
}
async function saveRoom(){
  const name=document.getElementById("rf-name").value.trim();
  if(!name){alert("Digite o nome do cômodo.");return;}
  roomFormData.name=name;
  if(roomFormMode==="add"){await sb("rooms",{method:"POST",body:JSON.stringify({id:"room_"+Date.now(),name:roomFormData.name,icon:roomFormData.icon,color:roomFormData.color})});}
  else{await sb(`rooms?id=eq.${roomFormData.id}`,{method:"PATCH",body:JSON.stringify({name:roomFormData.name,icon:roomFormData.icon,color:roomFormData.color})});}
  await loadAll();goBack();renderMain();
}
function toggleConfirmDelete(){document.getElementById("confirm-del-box").classList.toggle("show");}
async function delRoomDo(){
  await sb(`rooms?id=eq.${roomFormData.id}`,{method:"DELETE",prefer:""});
  if(selRoom===roomFormData.id)selRoom=null;
  await loadAll();showScreen("screen-main");sv(view);
}

function goRoomDetail(rid){
  selRoom=rid;const rm=roomById(rid);
  document.getElementById("rd-title").textContent=`${rm.icon} ${rm.name}`;
  document.getElementById("rd-edit-btn").style.display=role==="admin"?"block":"none";
  document.getElementById("rd-fab").style.display=role==="admin"?"flex":"none";
  renderRoomDetail();showScreen("screen-room-detail");
}
function renderRoomDetail(){
  const rm=roomById(selRoom);if(!rm)return;
  const ia=role==="admin";
  const rt=tasks.filter(t=>t.room_id===rm.id);
  let h=`<div class="rdh" style="background:${rm.color}14;border-left-color:${rm.color}"><span class="rdhic">${rm.icon}</span><span class="rdhtl" style="color:${rm.color}">${rm.name}</span></div>`;
  let has=false;
  DAYS_FULL.forEach((dn,di)=>{
    const dt=rt.filter(t=>t.days.includes(di));if(!dt.length)return;has=true;
    h+=`<div class="wdb"><div class="wdl">${dn}${di===TDI?`<span class="today-tag">hoje</span>`:""}</div>`;
    dt.forEach(t=>{
      const done=!!smap[`${t.id}_${di}`];
      h+=`<div class="ti${done?" done":""}" onclick="toggleTask('${t.id}',${di})"><div class="chk${done?" checked":""}" style="${done?`background:${rm.color};border-color:${rm.color}`:""}"> ${done?`<span class="ckm">✓</span>`:""}</div><div style="flex:1;min-width:0"><span class="tn">${t.name}</span>${t.description?`<span class="tdesc">${t.description}</span>`:""}</div>${ia?`<button class="del-btn" onclick="event.stopPropagation();delTask('${t.id}')">×</button>`:""}</div>`;
    });
    h+=`</div>`;
  });
  if(!has)h+=`<div class="empty"><div class="empty-ic">📋</div><p class="empty-tx">Nenhuma tarefa ainda.<br>Use o botão + para adicionar.</p></div>`;
  if(ia)h+=`<div style="height:80px"></div>`;
  document.getElementById("room-detail-content").innerHTML=h;
}

function sv(v){
  view=v;
  ["day","room","week"].forEach(x=>document.getElementById(`tab-${x}`).classList.toggle("active",x===v));
  document.getElementById("fab-btn").style.display=(role==="admin"&&v!=="room")?"flex":"none";
  renderMain();
}
function renderMain(){
  const ia=role==="admin";
  const c=document.getElementById("main-content");
  if(view==="day")c.innerHTML=renderDay(ia);
  else if(view==="room")c.innerHTML=renderRooms(ia);
  else c.innerHTML=renderWeek();
}
function sd2(i){selDay=i;renderMain();}

function renderDay(ia){
  const r=rate(selDay);const bc=r===100?"#3A7A5A":"#8B6914";
  let h=`<div class="day-bar">`;
  DAYS.forEach((d,i)=>{const ri=rate(i);h+=`<button class="day-btn${selDay===i?" active":""}${i===TDI?" today":""}" onclick="sd2(${i})"><span class="day-lbl">${d}</span><span class="day-cnt">${tfd(i).length}</span>${ri>0?`<div class="day-prog" style="width:${ri}%"></div>`:""}</button>`;});
  h+=`</div>`;
  h+=`<div class="prog-sec"><div class="prog-hdr"><span class="prog-lbl">${DAYS_FULL[selDay]}</span><span class="prog-pct">${r}%</span></div><div class="prog-track"><div class="prog-fill" style="width:${r}%;background:${bc}"></div></div></div>`;
  let has=false;
  rooms.forEach(rm=>{
    const dt=tasks.filter(t=>t.room_id===rm.id&&t.days.includes(selDay));
    if(!dt.length)return;has=true;
    const dn=dt.filter(t=>smap[`${t.id}_${selDay}`]).length;
    h+=`<div class="rc"><div class="rch" style="border-left-color:${rm.color}"><span class="rci">${rm.icon}</span><span class="rcn">${rm.name}</span><span class="rbadge" style="background:${rm.color}18;color:${rm.color}">${dn}/${dt.length}</span></div><div class="tlist">`;
    dt.forEach(t=>{
      const done=!!smap[`${t.id}_${selDay}`];
      h+=`<div class="ti${done?" done":""}" onclick="toggleTask('${t.id}',${selDay})"><div class="chk${done?" checked":""}" style="${done?`background:${rm.color};border-color:${rm.color}`:""}"> ${done?`<span class="ckm">✓</span>`:""}</div><div style="flex:1;min-width:0"><span class="tn">${t.name}</span>${t.description?`<span class="tdesc">${t.description}</span>`:""}</div>${ia?`<button class="del-btn" onclick="event.stopPropagation();delTask('${t.id}')">×</button>`:""}</div>`;
    });
    h+=`</div></div>`;
  });
  if(!has)h+=`<div class="empty"><div class="empty-ic">🎉</div><p class="empty-tx">Nenhuma tarefa para ${DAYS_FULL[selDay]}.<br>Dia de folga!</p></div>`;
  return h;
}

function renderRooms(ia){
  let h=`<div class="room-grid">`;
  rooms.forEach(rm=>{
    const tot=tasks.filter(t=>t.room_id===rm.id).length;
    const tod=tasks.filter(t=>t.room_id===rm.id&&t.days.includes(TDI)).length;
    h+=`<div class="room-tile" style="border-top-color:${rm.color}" onclick="goRoomDetail('${rm.id}')">
      ${ia?`<div class="rta"><button class="rta-btn" onclick="event.stopPropagation();goEditRoom('${rm.id}')">✏️</button></div>`:""}
      <div class="rti">${rm.icon}</div><div class="rtn">${rm.name}</div>
      <div class="rts"><span>${tot} tarefas</span><span style="color:${rm.color};font-weight:700">${tod} hoje</span></div>
    </div>`;
  });
  if(ia)h+=`<div class="add-tile" onclick="goAddRoom()"><div class="add-tile-ic">+</div><div class="add-tile-lbl">Novo Cômodo</div></div>`;
  return h+`</div>`;
}

function renderWeek(){
  let h=`<div class="week-grid">`;
  DAYS_FULL.forEach((dn,di)=>{
    const ts=tfd(di);const done=ts.filter(t=>smap[`${t.id}_${di}`]).length;
    const r=ts.length?Math.round(done/ts.length*100):0;
    const bc=r===100?"#3A7A5A":r>0?"#8B6914":"#DDD8CE";
    const ri=rooms.filter(rm=>tasks.some(t=>t.room_id===rm.id&&t.days.includes(di))).map(rm=>rm.icon).join(" ");
    h+=`<div class="wc${di===TDI?" today":""}" onclick="sv('day');sd2(${di})">
      <div class="wcd">${dn}${di===TDI?`<span class="tdot">●</span>`:""}</div>
      <div class="wcc">${ts.length} tarefas</div>
      <div class="wbt"><div class="wbf" style="width:${r}%;background:${bc}"></div></div>
      <div class="wcr">${r}%</div><div class="wri">${ri}</div>
    </div>`;
  });
  return h+`</div>`;
}

function renderLogin(){
  const w=document.getElementById("login-screen");
  w.style.cssText="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 28px;background:var(--bg);position:relative;z-index:1;";
  w.innerHTML=`
  <div class="lg-brand">
    <div class="lg-logo">🧹</div>
    <h1 class="lg-title">CasaLimpa</h1>
    <p class="lg-sub">Sua casa organizada</p>
  </div>
  <div class="lg-btns" id="lc">
    <button class="lg-btn lg-btn-i" onclick="dlogin('iniciar')">
      <span class="lg-btn-icon">▶️</span>
      <div class="lg-btn-text"><span class="lg-btn-lbl">Iniciar</span><span class="lg-btn-sub">Ver e marcar tarefas do dia</span></div>
    </button>
    <button class="lg-btn lg-btn-a" onclick="gpin()">
      <span class="lg-btn-icon">⚙️</span>
      <div class="lg-btn-text"><span class="lg-btn-lbl">Administrador</span><span class="lg-btn-sub">Gerenciar cômodos e tarefas</span></div>
    </button>
  </div>
  <div class="pin-section" id="lp">
    <p class="pin-lbl">PIN de administrador</p>
    <input class="pin-inp" id="pinf" type="password" inputmode="numeric" maxlength="6" placeholder="••••" onkeydown="if(event.key==='Enter')trypin()"/>
    <p class="pin-err" id="pe">PIN incorreto</p>
    <div class="pin-actions"><button class="btn-ghost" onclick="bkc()">Voltar</button><button class="btn-primary" onclick="trypin()">Entrar</button></div>
    <p class="pin-hint">PIN padrão: 1234</p>
  </div>`;
}
function gpin(){document.getElementById("lc").style.display="none";document.getElementById("lp").style.display="block";setTimeout(()=>document.getElementById("pinf").focus(),100);}
function bkc(){document.getElementById("lp").style.display="none";document.getElementById("lc").style.display="flex";}
function trypin(){
  const v=document.getElementById("pinf").value;
  if(v===ADMIN_PIN){dlogin("admin");}
  else{const f=document.getElementById("pinf"),e=document.getElementById("pe");f.classList.add("err");e.style.display="block";f.value="";setTimeout(()=>{f.classList.remove("err");e.style.display="none";},1500);}
}
function dlogin(r){
  role=r;
  document.getElementById("login-screen").style.display="none";
  const rp=document.getElementById("role-pill");
  if(r==="admin"){rp.textContent="⚙️ Admin";rp.className="role-pill rp-a";}
  else{rp.textContent="▶️ Iniciando";rp.className="role-pill rp-i";}
  document.getElementById("today-badge").innerHTML=`${DAYS_FULL[TDI]}, ${TDD}`;
  showScreen("screen-main");sv("day");
  poll=setInterval(async()=>{
    await loadAll();renderMain();
    if(document.getElementById("screen-room-detail").classList.contains("active"))renderRoomDetail();
  },8000);
}
function doLogout(){
  role=null;selRoom=null;view="day";
  if(poll){clearInterval(poll);poll=null;}
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  renderLogin();
}

(async()=>{
  try{await seedIfEmpty();await loadAll();}catch(e){console.error(e);}
  document.getElementById("loading").style.display="none";
  renderLogin();
})();
</script>
</body>
</html>
