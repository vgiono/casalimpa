function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}
function goBack(){showScreen(backScreen);if(backScreen==="screen-room-detail")renderRoomDetail();}

// ── Helpers ──
function tfd(day){return rooms.flatMap(r=>tasks.filter(t=>t.room_id===r.id&&t.days.includes(day)).map(t=>({...t,rc:r.color,ri:r.icon,rn:r.name})));}
function rate(day){const ts=tfd(day);if(!ts.length)return 0;return Math.round(ts.filter(t=>smap[`${t.id}_${day}`]).length/ts.length*100);}
function roomById(id){return rooms.find(r=>r.id===id);}
function setSyncDot(v){const el=document.getElementById("sync-dot");if(el)el.style.display=v?"inline":"none";}

// ── Toggle task ──
async function toggleTask(tid,di){
  const k=`${tid}_${di}`,cur=!!smap[k];
  smap[k]=!cur;renderMain();if(selRoom)renderRoomDetail();
  syncing=true;setSyncDot(true);
  try{await sb("task_status",{method:"POST",prefer:"resolution=merge-duplicates",body:JSON.stringify({id:`${tid}_${di}_${TDS}`,task_id:tid,day_index:di,date:TDS,completed:!cur,updated_at:new Date().toISOString()})});}
  catch(e){smap[k]=cur;renderMain();}
  syncing=false;setSyncDot(false);
}

// ── Delete task ──
async function delTask(tid){
  if(!confirm("Excluir esta tarefa?"))return;
  await sb(`tasks?id=eq.${tid}`,{method:"DELETE",prefer:""});
  await loadAll();renderMain();if(selRoom)renderRoomDetail();
}

// ── Task form ──
function goAddTask(){
  taskFormMode="add";taskFormData={id:null,name:"",roomId:"",days:[]};
  backScreen="screen-main";
  document.getElementById("task-form-title").textContent="Nova Tarefa";
  document.getElementById("tf-name").value="";
  const sel=document.getElementById("tf-room");
  sel.innerHTML=`<option value="">Selecione o cômodo</option>`+rooms.map(r=>`<option value="${r.id}">${r.icon} ${r.name}</option>`).join("");
  renderTfDays();
  showScreen("screen-task");
  setTimeout(()=>document.getElementById("tf-name").focus(),200);
}
function goAddTaskRoom(rid){
  taskFormMode="add";taskFormData={id:null,name:"",roomId:rid,days:[]};
  backScreen="screen-room-detail";
  document.getElementById("task-form-title").textContent="Nova Tarefa";
  document.getElementById("tf-name").value="";
  const sel=document.getElementById("tf-room");
  sel.innerHTML=`<option value="">Selecione o cômodo</option>`+rooms.map(r=>`<option value="${r.id}">${r.icon} ${r.name}</option>`).join("");
  sel.value=rid;
  taskFormData.roomId=rid;
  renderTfDays();
  showScreen("screen-task");
  setTimeout(()=>document.getElementById("tf-name").focus(),200);
}
function renderTfDays(){
  document.getElementById("tf-days").innerHTML=DAYS.map((d,i)=>
    `<button class="day-toggle${taskFormData.days.includes(i)?" on":""}" onclick="toggleTfDay(${i})">${d}</button>`
  ).join("");
}
function toggleTfDay(i){
  taskFormData.days=taskFormData.days.includes(i)?taskFormData.days.filter(x=>x!==i):[...taskFormData.days,i];
  renderTfDays();
}
async function saveTask(){
  const name=document.getElementById("tf-name").value.trim();
  const roomId=document.getElementById("tf-room").value;
  if(!name||!roomId||!taskFormData.days.length){alert("Preencha nome, cômodo e pelo menos um dia.");return;}
  if(taskFormMode==="add"){
    await sb("tasks",{method:"POST",body:JSON.stringify({id:"t"+Date.now(),room_id:roomId,name,days:taskFormData.days})});
  } else {
    await sb(`tasks?id=eq.${taskFormData.id}`,{method:"PATCH",body:JSON.stringify({name,room_id:roomId,days:taskFormData.days})});
  }
  await loadAll();goBack();renderMain();
}

// ── Room form ──
function goAddRoom(){
  roomFormMode="add";
  roomFormData={id:null,name:"",icon:"🏠",color:PAL[rooms.length%PAL.length]};
  backScreen="screen-main";
  document.getElementById("room-form-title").textContent="Novo Cômodo";
  document.getElementById("rf-name").value="";
  document.getElementById("rf-danger").style.display="none";
  document.getElementById("confirm-del-box").classList.remove("show");
  renderRfIcons();renderRfColors();uprev();
  showScreen("screen-room-form");
  setTimeout(()=>document.getElementById("rf-name").focus(),200);
}
function goEditRoom(rid){
  const r=roomById(rid);
  roomFormMode="edit";roomFormData={id:r.id,name:r.name,icon:r.icon,color:r.color};
  backScreen=selRoom?"screen-room-detail":"screen-main";
  document.getElementById("room-form-title").textContent="Editar Cômodo";
  document.getElementById("rf-name").value=r.name;
  const tc=tasks.filter(t=>t.room_id===r.id).length;
  document.getElementById("rf-danger").style.display="block";
  document.getElementById("confirm-del-box").classList.remove("show");
  document.getElementById("confirm-del-txt").innerHTML=`Excluir <strong style="color:${r.color}">${r.name}</strong>?${tc>0?`<br>As ${tc} tarefa(s) serão removidas permanentemente.`:""}`;
  renderRfIcons();renderRfColors();uprev();
  showScreen("screen-room-form");
}
function renderRfIcons(){
  document.getElementById("rf-icons").innerHTML=ICONS.map(ic=>
    `<button class="icon-pick${roomFormData.icon===ic?" on":""}" style="border-color:${roomFormData.icon===ic?roomFormData.color:"#222"};border-width:${roomFormData.icon===ic?"2px":"1px"}" onclick="pickIcon('${ic}')">${ic}</button>`
  ).join("");
}
function renderRfColors(){
  document.getElementById("rf-colors").innerHTML=PAL.map(c=>
    `<button class="color-pick${roomFormData.color===c?" on":""}" style="background:${c}" onclick="pickColor('${c}')">${roomFormData.color===c?`<span class="cck">✓</span>`:""}</button>`
  ).join("");
}
function pickIcon(ic){roomFormData.icon=ic;renderRfIcons();uprev();}
function pickColor(c){roomFormData.color=c;renderRfColors();renderRfIcons();uprev();}
function uprev(){
  roomFormData.name=document.getElementById("rf-name").value;
  const p=document.getElementById("rf-prev"),nm=document.getElementById("prev-nm"),ic=document.getElementById("prev-ic");
  p.style.borderTopColor=roomFormData.color;p.style.borderLeftColor=roomFormData.color;
  nm.style.color=roomFormData.color;nm.textContent=roomFormData.name||"Nome do cômodo";
  ic.textContent=roomFormData.icon;
}
async function saveRoom(){
  const name=document.getElementById("rf-name").value.trim();
  if(!name){alert("Digite o nome do cômodo.");return;}
  roomFormData.name=name;
  if(roomFormMode==="add"){
    await sb("rooms",{method:"POST",body:JSON.stringify({id:"room_"+Date.now(),name:roomFormData.name,icon:roomFormData.icon,color:roomFormData.color})});
  } else {
    await sb(`rooms?id=eq.${roomFormData.id}`,{method:"PATCH",body:JSON.stringify({name:roomFormData.name,icon:roomFormData.icon,color:roomFormData.color})});
  }
  await loadAll();goBack();renderMain();
}
function toggleConfirmDelete(){document.getElementById("confirm-del-box").classList.toggle("show");}
async function delRoomDo(){
  await sb(`rooms?id=eq.${roomFormData.id}`,{method:"DELETE",prefer:""});
  if(selRoom===roomFormData.id)selRoom=null;
  await loadAll();
  showScreen("screen-main");sv(view);
}

// ── Room detail ──
function goRoomDetail(rid){
  selRoom=rid;
  const rm=roomById(rid);
  document.getElementById("rd-title").textContent=`${rm.icon} ${rm.name}`;
  document.getElementById("rd-edit-btn").style.display=role==="admin"?"block":"none";
  document.getElementById("rd-fab").style.display=role==="admin"?"flex":"none";
  renderRoomDetail();
  showScreen("screen-room-detail");
}
function renderRoomDetail(){
  const rm=roomById(selRoom);if(!rm)return;
  const ia=role==="admin";
  const rt=tasks.filter(t=>t.room_id===rm.id);
  let h=`<div class="rdh" style="background:${rm.color}22"><span class="rdhic">${rm.icon}</span><span class="rdhtl" style="color:${rm.color}">${rm.name}</span></div>`;
  let has=false;
  DAYS_FULL.forEach((dn,di)=>{
    const dt=rt.filter(t=>t.days.includes(di));if(!dt.length)return;has=true;
    h+=`<div class="wdb"><div class="wdl">${dn}${di===TDI?`<span class="today-tag">hoje</span>`:""}</div>`;
    dt.forEach(t=>{
      const done=!!smap[`${t.id}_${di}`];
      h+=`<div class="ti${done?" done":""}" onclick="toggleTask('${t.id}',${di})"><div class="chk${done?" checked":""}" style="${done?`background:${rm.color}`:""}"> ${done?`<span class="ckm">✓</span>`:""}</div><span class="tn">${t.name}</span>${ia?`<button class="del-btn" onclick="event.stopPropagation();delTask('${t.id}')">×</button>`:""}</div>`;
    });
    h+=`</div>`;
  });
  if(!has)h+=`<div class="empty"><div class="empty-ic">📋</div><p class="empty-tx">Nenhuma tarefa ainda.</p></div>`;
  if(ia)h+=`<div style="height:80px"></div>`;
  document.getElementById("room-detail-content").innerHTML=h;
}

// ── Main render ──
function sv(v){
  view=v;
  ["day","room","week"].forEach(x=>document.getElementById(`tab-${x}`).classList.toggle("active",x===v));
  document.getElementById("fab-btn").style.display=(role==="admin"&&v!=="room")?"flex":"none";
  renderMain();
}
function renderMain(){
  const ia=role==="admin";
  const c=document.getElementById("main-content");
  if(view==="day")c.innerHTML=renderDay(ia);
  else if(view==="room")c.innerHTML=renderRooms(ia);
  else c.innerHTML=renderWeek();
}
function sd2(i){selDay=i;renderMain();}

function renderDay(ia){
  const r=rate(selDay);const bc=r===100?"#47C99A":"#E8C547";
  let h=`<div class="day-bar">`;
  DAYS.forEach((d,i)=>{const ri=rate(i);h+=`<button class="day-btn${selDay===i?" active":""}${i===TDI?" today":""}" onclick="sd2(${i})"><span class="day-lbl">${d}</span><span class="day-cnt">${tfd(i).length}</span>${ri>0?`<div class="day-prog" style="width:${ri}%"></div>`:""}</button>`;});
  h+=`</div><div class="prog-sec"><div class="prog-hdr"><span class="prog-lbl">${DAYS_FULL[selDay]}</span><span class="prog-pct">${r}% concluído</span></div><div class="prog-track"><div class="prog-fill" style="width:${r}%;background:${bc}"></div></div></div>`;
  let has=false;
  rooms.forEach(rm=>{
    const dt=tasks.filter(t=>t.room_id===rm.id&&t.days.includes(selDay));
    if(!dt.length)return;has=true;
    const dn=dt.filter(t=>smap[`${t.id}_${selDay}`]).length;
    h+=`<div class="rc"><div class="rch" style="border-left-color:${rm.color}"><span class="rci">${rm.icon}</span><span class="rcn">${rm.name}</span><span class="rbadge" style="background:${rm.color}22;color:${rm.color}">${dn}/${dt.length}</span></div><div class="tlist">`;
    dt.forEach(t=>{const done=!!smap[`${t.id}_${selDay}`];h+=`<div class="ti${done?" done":""}" onclick="toggleTask('${t.id}',${selDay})"><div class="chk${done?" checked":""}" style="${done?`background:${rm.color}`:""}"> ${done?`<span class="ckm">✓</span>`:""}</div><span class="tn">${t.name}</span>${ia?`<button class="del-btn" onclick="event.stopPropagation();delTask('${t.id}')">×</button>`:""}</div>`;});
    h+=`</div></div>`;
  });
  if(!has)h+=`<div class="empty"><div class="empty-ic">🎉</div><p class="empty-tx">Dia de folga! Sem tarefas para ${DAYS_FULL[selDay]}.</p></div>`;
  return h;
}

function renderRooms(ia){
  let h=`<div class="room-grid">`;
  rooms.forEach(rm=>{
    const tot=tasks.filter(t=>t.room_id===rm.id).length;
    const tod=tasks.filter(t=>t.room_id===rm.id&&t.days.includes(TDI)).length;
    h+=`<div class="room-tile" style="border-top-color:${rm.color}" onclick="goRoomDetail('${rm.id}')">
      ${ia?`<div class="rta"><button class="rta-btn" onclick="event.stopPropagation();goEditRoom('${rm.id}')">✏️</button></div>`:""}
      <div class="rti">${rm.icon}</div><div class="rtn">${rm.name}</div>
      <div class="rts"><span>${tot} tarefas</span><span style="color:${rm.color}">${tod} hoje</span></div>
    </div>`;
  });
  if(ia)h+=`<div class="add-tile" onclick="goAddRoom()"><div class="add-tile-ic">+</div><div class="add-tile-lbl">Novo Cômodo</div></div>`;
  return h+`</div>`;
}

function renderWeek(){
  let h=`<div class="week-grid">`;
  DAYS_FULL.forEach((dn,di)=>{
    const ts=tfd(di);const done=ts.filter(t=>smap[`${t.id}_${di}`]).length;
    const r=ts.length?Math.round(done/ts.length*100):0;
    const bc=r===100?"#47C99A":r>0?"#E8C547":"#333";
    const ri=rooms.filter(rm=>tasks.some(t=>t.room_id===rm.id&&t.days.includes(di))).map(rm=>rm.icon).join(" ");
    h+=`<div class="wc${di===TDI?" today":""}" onclick="sv('day');sd2(${di})">
      <div class="wcd">${dn}${di===TDI?`<span class="tdot">●</span>`:""}</div>
      <div class="wcc">${ts.length} tarefas</div>
      <div class="wbt"><div class="wbf" style="width:${r}%;background:${bc}"></div></div>
      <div class="wcr">${r}%</div><div class="wri">${ri}</div>
    </div>`;
  });
  return h+`</div>`;
}

// ── Login ──
function renderLogin(){
  const w=document.getElementById("login-screen");
  w.style.cssText="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px 24px;position:relative;z-index:1;";
  w.innerHTML=`<div class="lg-logo">🧹</div><h1 class="lg-title">CasaLimpa</h1><p class="lg-sub">Como você quer entrar?</p>
  <div class="lg-btns" id="lc">
    <button class="lg-btn lg-btn-a" onclick="gpin()"><span style="font-size:24px">👑</span><span class="lg-btn-lbl">Administrador</span><span class="lg-btn-sub">Editar tarefas e cômodos</span></button>
    <button class="lg-btn lg-btn-e" onclick="dlogin('executor')"><span style="font-size:24px">✅</span><span class="lg-btn-lbl">Executor</span><span class="lg-btn-sub">Marcar tarefas concluídas</span></button>
  </div>
  <div class="pin-wrap" id="lp">
    <p class="pin-lbl">PIN de administrador</p>
    <input class="pin-inp" id="pinf" type="password" inputmode="numeric" maxlength="6" placeholder="••••" onkeydown="if(event.key==='Enter')trypin()"/>
    <p class="pin-err" id="pe">PIN incorreto</p>
    <div class="ma" style="margin-top:8px"><button class="can-btn" onclick="bkc()">Voltar</button><button class="ok-btn" onclick="trypin()">Entrar</button></div>
    <p class="pin-hint">PIN padrão: 1234</p>
  </div>`;
}
function gpin(){document.getElementById("lc").style.display="none";document.getElementById("lp").style.display="block";setTimeout(()=>document.getElementById("pinf").focus(),100);}
function bkc(){document.getElementById("lp").style.display="none";document.getElementById("lc").style.display="flex";}
function trypin(){
  const v=document.getElementById("pinf").value;
  if(v===ADMIN_PIN){dlogin("admin");}
  else{const f=document.getElementById("pinf"),e=document.getElementById("pe");f.classList.add("err");e.style.display="block";f.value="";setTimeout(()=>{f.classList.remove("err");e.style.display="none";},1500);}
}
function dlogin(r){
  role=r;
  document.getElementById("login-screen").style.display="none";
  const rp=document.getElementById("role-pill");
  rp.textContent=r==="admin"?"👑 Admin":"✅ Executor";
  rp.className="role-pill "+(r==="admin"?"ra":"re");
  document.getElementById("today-badge").innerHTML=`Hoje é <strong>${DAYS_FULL[TDI]}, ${TDD}</strong>`;
  showScreen("screen-main");
  sv("day");
  poll=setInterval(async()=>{await loadAll();renderMain();if(document.getElementById("screen-room-detail").classList.contains("active"))renderRoomDetail();},8000);
}
function doLogout(){
  role=null;selRoom=null;view="day";
  if(poll){clearInterval(poll);poll=null;}
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  renderLogin();
}

(async()=>{
  try{await seedIfEmpty();await loadAll();}catch(e){console.error(e);}
  document.getElementById("loading").style.display="none";
  renderLogin();
})();
</script>
</body>
