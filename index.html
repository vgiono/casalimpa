<script>

const DAYS=["Seg","Ter","Qua","Qui","Sex","Sáb","Dom"];

const PAL=["#E8C547","#E87A47","#E84747","#E847A0","#C97AE8","#7A9BE8","#47C9C9","#47E8A0","#A0E847","#E8E847"];

const TDI=new Date().getDay()===0?6:new Date().getDay()-1;

const SEED_R=[{id:"sala",name:"Sala",icon:"🛋️",color:"#E8C547"},{id:"cozinha",name:"Cozinha",icon:"🍳",color:"#E87A47"},{id:"quarto",name:"Quarto",icon:"🛏️",color:"#7A9BE8"},{id:"banheiro",name:"Banheiro",icon:"🚿",color:"#47C9C9"},{id:"lavanderia",name:"Lavanderia",icon:"🧺",color:"#C97AE8"}];

let role=null,rooms=[],tasks=[],smap={};
let view="day",selDay=TDI,selRoom=null,syncing=false,poll=null;
let ntask={name:"",roomId:"",days:[]};

async function sb(path,opts={}){const r=await fetch(`${SB_URL}/rest/v1/${path}`,{headers:{apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`,"Content-Type":"application/json",Prefer:opts.prefer??"return=representation"},...opts});const t=await r.text();if(!r.ok)throw new Error(t);return t?JSON.parse(t):[];}
async function loadAll(){const[r,t,s]=await Promise.all([sb("rooms?order=created_at"),sb("tasks?order=created_at"),sb(`task_status?date=eq.${TDS}&select=task_id,day_index,completed`)]);rooms=r;tasks=t;smap={};s.forEach(x=>{smap[`${x.task_id}_${x.day_index}`]=x.completed;});}
async function seedIfEmpty(){const ex=await sb("rooms?select=id");if(!ex.length){await sb("rooms",{method:"POST",prefer:"resolution=ignore",body:JSON.stringify(SEED_R)});await sb("tasks",{method:"POST",prefer:"resolution=ignore",body:JSON.stringify(SEED_T)});}}
function tfd(day){return rooms.flatMap(r=>tasks.filter(t=>t.room_id===r.id&&t.days.includes(day)).map(t=>({...t,rn:r.name,ri:r.icon,rc:r.color})));}
function rate(day){const ts=tfd(day);if(!ts.length)return 0;return Math.round(ts.filter(t=>smap[`${t.id}_${day}`]).length/ts.length*100);}
function roomById(id){return rooms.find(r=>r.id===id);}
async function toggleTask(tid,di){const k=`${tid}_${di}`,cur=!!smap[k];smap[k]=!cur;ra();syncing=true;sd();try{await sb("task_status",{method:"POST",prefer:"resolution=merge-duplicates",body:JSON.stringify({id:`${tid}_${di}_${TDS}`,task_id:tid,day_index:di,date:TDS,completed:!cur,updated_at:new Date().toISOString()})});}catch(e){smap[k]=cur;ra();}syncing=false;sd();}
async function addTaskDo(){if(!ntask.name||!ntask.roomId||!ntask.days.length)return;await sb("tasks",{method:"POST",body:JSON.stringify({id:"t"+Date.now(),room_id:ntask.roomId,name:ntask.name,days:ntask.days})});await loadAll();ntask={name:"",roomId:"",days:[]};cm("mat");ra();}
async function delTask(tid){await sb(`tasks?id=eq.${tid}`,{method:"DELETE",prefer:""});await loadAll();ra();}
async function saveRoom(){if(!eroom.name)return;if(rmode==="add"){await sb("rooms",{method:"POST",body:JSON.stringify({id:"room_"+Date.now(),name:eroom.name,icon:eroom.icon,color:eroom.color})});}else{await sb(`rooms?id=eq.${eroom.id}`,{method:"PATCH",body:JSON.stringify({name:eroom.name,icon:eroom.icon,color:eroom.color})});}await loadAll();cm("mr");ra();}
async function delRoomDo(){await sb(`rooms?id=eq.${rdel.id}`,{method:"DELETE",prefer:""});if(selRoom===rdel.id)selRoom=null;await loadAll();cm("md");rdel=null;ra();}

function sd(){const el=document.getElementById("sync-dot");if(el)el.style.display=syncing?"inline":"none";}
function ra(){
  const ia=role==="admin";
  document.getElementById("app-wrap").innerHTML=`
<header><div class="hl"><div class="h-logo">🧹</div><div><div class="h-title">CasaLimpa</div><div class="h-sub">Organização da faxina</div></div></div><div class="hr"><div class="today-badge">Hoje é <strong>${DAYS_FULL[TDI]}, ${TDD}</strong></div><div class="hm"><span class="role-pill ${ia?"ra":"re"}">${ia?"👑 Admin":"✅ Executor"}</span><span id="sync-dot" style="display:none;color:#E8C547;font-size:13px;">↻</span><button class="logout-btn" onclick="doLogout()">Sair</button></div></div></header>
<div class="tabs"><button class="tab${view==="day"?" active":""}" onclick="sv('day')">📅 Por Dia</button><button class="tab${view==="room"?" active":""}" onclick="sv('room')">🏠 Por Cômodo</button><button class="tab${view==="week"?" active":""}" onclick="sv('week')">📊 Semana</button></div>
<div class="content">${view==="day"?rdv(ia):view==="room"?rrv(ia):rwv()}</div>
${ia&&view!=="room"?`<button class="fab" onclick="oat()">+</button>`:""}
${rmat()}${rmr()}${rmd()}`;
}
function rdv(ia){const r=rate(selDay);const bc=r===100?"#47C99A":"#E8C547";let h=`<div class="day-bar">`;DAYS.forEach((d,i)=>{const ri=rate(i);h+=`<button class="day-btn${selDay===i?" active":""}${i===TDI?" today":""}" onclick="sd2(${i})"><span class="day-lbl">${d}</span><span class="day-cnt">${tfd(i).length}</span>${ri>0?`<div class="day-prog" style="width:${ri}%"></div>`:""}</button>`;});h+=`</div><div class="prog-sec"><div class="prog-hdr"><span class="prog-lbl">${DAYS_FULL[selDay]}</span><span class="prog-pct">${r}% concluído</span></div><div class="prog-track"><div class="prog-fill" style="width:${r}%;background:${bc}"></div></div></div>`;let has=false;rooms.forEach(rm=>{const dt=tasks.filter(t=>t.room_id===rm.id&&t.days.includes(selDay));if(!dt.length)return;has=true;const dn=dt.filter(t=>smap[`${t.id}_${selDay}`]).length;h+=`<div class="rc"><div class="rch" style="border-left-color:${rm.color}"><span class="rci">${rm.icon}</span><span class="rcn">${rm.name}</span><span class="rbadge" style="background:${rm.color}22;color:${rm.color}">${dn}/${dt.length}</span></div><div class="tlist">`;dt.forEach(t=>{const done=!!smap[`${t.id}_${selDay}`];h+=`<div class="ti${done?" done":""}" onclick="toggleTask('${t.id}',${selDay})"><div class="chk${done?" checked":""}" style="${done?`background:${rm.color}`:""}"> ${done?`<span class="ckm">✓</span>`:""}</div><span class="tn">${t.name}</span>${ia?`<button class="del-btn" onclick="event.stopPropagation();delTask('${t.id}')">×</button>`:""}</div>`;});h+=`</div></div>`;});if(!has)h+=`<div class="empty"><div class="empty-ic">🎉</div><p class="empty-tx">Dia de folga! Sem tarefas para ${DAYS_FULL[selDay]}.</p></div>`;return h;}
function rrv(ia){if(selRoom){const rm=roomById(selRoom);if(!rm){selRoom=null;return rrv(ia);}const rt=tasks.filter(t=>t.room_id===rm.id);let h=`<div class="rdtb"><button class="back-btn" onclick="sr(null)">← Voltar</button>${ia?`<div class="rdta"><button class="rda-btn" onclick="oer('${rm.id}')">✏️ Editar</button><button class="rda-btn" style="color:#E84747;border-color:rgba(232,71,71,.2)" onclick="odr('${rm.id}')">🗑️ Excluir</button></div>`:""}</div>`;h+=`<div class="rdh" style="background:${rm.color}22"><span class="rdhic">${rm.icon}</span><span class="rdhtl" style="color:${rm.color}">${rm.name}</span></div>`;let has=false;DAYS_FULL.forEach((dn,di)=>{const dt=rt.filter(t=>t.days.includes(di));if(!dt.length)return;has=true;h+=`<div class="wdb"><div class="wdl">${dn}${di===TDI?`<span class="today-tag">hoje</span>`:""}</div>`;dt.forEach(t=>{const done=!!smap[`${t.id}_${di}`];h+=`<div class="ti${done?" done":""}" onclick="toggleTask('${t.id}',${di})"><div class="chk${done?" checked":""}" style="${done?`background:${rm.color}`:""}"> ${done?`<span class="ckm">✓</span>`:""}</div><span class="tn">${t.name}</span>${ia?`<button class="del-btn" onclick="event.stopPropagation();delTask('${t.id}')">×</button>`:""}</div>`;});h+=`</div>`;});if(!has)h+=`<div class="empty"><div class="empty-ic">📋</div><p class="empty-tx">Nenhuma tarefa ainda.</p></div>`;if(ia)h+=`<button class="add-task-btn" style="background:${rm.color}" onclick="oatRoom('${rm.id}')">+ Adicionar Tarefa</button>`;return h;}let h=`<div class="room-grid">`;rooms.forEach(rm=>{const tot=tasks.filter(t=>t.room_id===rm.id).length;const tod=tasks.filter(t=>t.room_id===rm.id&&t.days.includes(TDI)).length;h+=`<div class="room-tile" style="border-top-color:${rm.color}" onclick="sr('${rm.id}')">${ia?`<div class="rta"><button class="tab-btn" onclick="event.stopPropagation();oer('${rm.id}')">✏️</button><button class="tab-btn" onclick="event.stopPropagation();odr('${rm.id}')">🗑️</button></div>`:""}<div class="rti">${rm.icon}</div><div class="rtn">${rm.name}</div><div class="rts"><span>${tot} tarefas</span><span style="color:${rm.color}">${tod} hoje</span></div></div>`;});if(ia)h+=`<div class="add-room-tile" onclick="oar()"><div class="ari">+</div><div class="arl">Novo Cômodo</div></div>`;h+=`</div>`;return h;}
function rwv(){let h=`<div class="week-grid">`;DAYS_FULL.forEach((dn,di)=>{const ts=tfd(di);const done=ts.filter(t=>smap[`${t.id}_${di}`]).length;const r=ts.length?Math.round(done/ts.length*100):0;const bc=r===100?"#47C99A":r>0?"#E8C547":"#333";const ri=rooms.filter(rm=>tasks.some(t=>t.room_id===rm.id&&t.days.includes(di))).map(rm=>rm.icon).join(" ");h+=`<div class="wc${di===TDI?" today":""}" onclick="sv('day');sd2(${di})"><div class="wcd">${dn}${di===TDI?`<span class="tdot">●</span>`:""}</div><div class="wcc">${ts.length} tarefas</div><div class="wbt"><div class="wbf" style="width:${r}%;background:${bc}"></div></div><div class="wcr">${r}%</div><div class="wri">${ri}</div></div>`;});return h+`</div>`;}
function rmat(){const ro=rooms.map(r=>`<option value="${r.id}"${ntask.roomId===r.id?" selected":""}>${r.icon} ${r.name}</option>`).join("");const db=DAYS.map((d,i)=>`<button class="dt${ntask.days.includes(i)?" active":""}" onclick="tnd(${i})">${d}</button>`).join("");return `<div class="overlay" id="mat" onclick="cm('mat')"><div class="modal" onclick="event.stopPropagation()"><div class="mt">Nova Tarefa</div><input class="mi" id="nt-name" placeholder="Nome da tarefa..." value="${ntask.name}" oninput="ntask.name=this.value"/><select class="mi" id="nt-room" onchange="ntask.roomId=this.value"><option value="">Selecione o cômodo</option>${ro}</select><span class="ml">Dias da semana:</span><div class="days-row" id="drow">${db}</div><div class="ma"><button class="can-btn" onclick="cm('mat')">Cancelar</button><button class="ok-btn" onclick="addTaskDo()">Adicionar</button></div></div></div>`;}
function rmr(){const ib=ICONS.map(ic=>`<button class="ib${eroom.icon===ic?" active":""}" style="border-color:${eroom.icon===ic?eroom.color:"#222"};border-width:${eroom.icon===ic?"2px":"1px"}" onclick="sei('${ic}')">${ic}</button>`).join("");const cb=PAL.map(c=>`<button class="cb${eroom.color===c?" active":""}" style="background:${c}" onclick="sec('${c}')">${eroom.color===c?`<span class="cck">✓</span>`:""}</button>`).join("");return `<div class="overlay" id="mr" onclick="cm('mr')"><div class="modal" onclick="event.stopPropagation()"><div class="mt">${rmode==="add"?"Novo Cômodo":"Editar Cômodo"}</div><input class="mi" id="rname" placeholder="Nome do cômodo..." value="${eroom.name}" oninput="eroom.name=this.value;uprev()"/><span class="ml">Ícone:</span><div class="icon-row">${ib}</div><span class="ml">Cor:</span><div class="color-row">${cb}</div><span class="ml">Pré-visualização:</span><div class="rprev" id="rprev" style="border-top-color:${eroom.color};border-left-color:${eroom.color}"><span id="prev-ic" style="font-size:20px">${eroom.icon}</span><span id="prev-nm" class="rpn" style="color:${eroom.color}">${eroom.name||"Nome do cômodo"}</span></div><div class="ma"><button class="can-btn" onclick="cm('mr')">Cancelar</button><button class="ok-btn" onclick="saveRoom()">${rmode==="add"?"Criar":"Salvar"}</button></div></div></div>`;}
function rmd(){if(!rdel)return`<div class="overlay" id="md"></div>`;const tc=tasks.filter(t=>t.room_id===rdel.id).length;return `<div class="overlay" id="md" onclick="cm('md')"><div class="modal" onclick="event.stopPropagation()"><div class="dmi">${rdel.icon}</div><div class="mt" style="text-align:center">Excluir cômodo?</div><p class="dw">Tem certeza que deseja excluir <strong style="color:${rdel.color}">${rdel.name}</strong>?${tc>0?` As ${tc} tarefa(s) serão removidas.`:""}</p><div class="ma"><button class="can-btn" onclick="cm('md')">Cancelar</button><button class="del-ok-btn" onclick="delRoomDo()">Excluir</button></div></div></div>`;}
function sv(v){view=v;ra();}
function sd2(i){selDay=i;ra();}
function sr(id){selRoom=id;ra();}
function oat(){ntask={name:"",roomId:"",days:[]};ra();om("mat");}
function oatRoom(rid){ntask={name:"",roomId:rid,days:[]};ra();om("mat");}
function tnd(i){ntask.days=ntask.days.includes(i)?ntask.days.filter(x=>x!==i):[...ntask.days,i];const row=document.getElementById("drow");if(row)row.innerHTML=DAYS.map((d,idx)=>`<button class="dt${ntask.days.includes(idx)?" active":""}" onclick="tnd(${idx})">${d}</button>`).join("");}
function oar(){rmode="add";eroom={id:null,name:"",icon:"🏠",color:PAL[rooms.length%PAL.length]};ra();om("mr");}
function oer(rid){const r=roomById(rid);rmode="edit";eroom={id:r.id,name:r.name,icon:r.icon,color:r.color};ra();om("mr");}
function odr(rid){rdel=roomById(rid);ra();om("md");}
function sei(ic){eroom.icon=ic;document.querySelectorAll(".ib").forEach(b=>{const m=b.textContent.trim()===ic;b.classList.toggle("active",m);b.style.borderColor=m?eroom.color:"#222";b.style.borderWidth=m?"2px":"1px";});uprev();}
function sec(c){eroom.color=c;document.querySelectorAll(".cb").forEach(b=>{const m=b.style.background===c||b.style.backgroundColor===c;b.classList.toggle("active",m);b.innerHTML=m?`<span class="cck">✓</span>`:"";}); document.querySelectorAll(".ib.active").forEach(b=>b.style.borderColor=c);uprev();}
function uprev(){const p=document.getElementById("rprev"),nm=document.getElementById("prev-nm"),ic=document.getElementById("prev-ic");if(!p)return;p.style.borderTopColor=eroom.color;p.style.borderLeftColor=eroom.color;nm.style.color=eroom.color;nm.textContent=eroom.name||"Nome do cômodo";ic.textContent=eroom.icon;}
function renderLogin(){const w=document.getElementById("login-wrap");w.style.display="flex";w.style.flexDirection="column";w.style.alignItems="center";w.style.justifyContent="center";w.style.minHeight="100vh";w.style.padding="32px 24px";w.innerHTML=`<div class="login-logo">🧹</div><h1 class="login-title">CasaLimpa</h1><p class="login-sub">Como você quer entrar?</p><div class="login-btns" id="lc"><button class="login-btn btn-admin" onclick="gpin()"><span style="font-size:24px">👑</span><span class="login-btn-label">Administrador</span><span class="login-btn-sub">Editar tarefas e cômodos</span></button><button class="login-btn btn-executor" onclick="dlogin('executor')"><span style="font-size:24px">✅</span><span class="login-btn-label">Executor</span><span class="login-btn-sub">Marcar tarefas concluídas</span></button></div><div class="pin-wrap" id="lp"><p class="pin-label">PIN de administrador</p><input class="pin-input" id="pinf" type="password" inputmode="numeric" maxlength="6" placeholder="••••" onkeydown="if(event.key==='Enter')trypin()"/><p class="pin-error" id="pe">PIN incorreto</p><div class="ma" style="margin-top:8px"><button class="can-btn" onclick="bkc()">Voltar</button><button class="ok-btn" onclick="trypin()">Entrar</button></div><p class="pin-hint">PIN padrão: 1234</p></div>`;}
function gpin(){document.getElementById("lc").style.display="none";document.getElementById("lp").style.display="block";setTimeout(()=>document.getElementById("pinf").focus(),100);}
function bkc(){document.getElementById("lp").style.display="none";document.getElementById("lc").style.display="flex";}
function trypin(){const v=document.getElementById("pinf").value;if(v===ADMIN_PIN){dlogin("admin");}else{const f=document.getElementById("pinf"),e=document.getElementById("pe");f.classList.add("error");e.style.display="block";f.value="";setTimeout(()=>{f.classList.remove("error");e.style.display="none";},1500);}}
function dlogin(r){role=r;document.getElementById("login-wrap").style.display="none";document.getElementById("app-wrap").style.display="flex";ra();poll=setInterval(async()=>{await loadAll();ra();},8000);}
function doLogout(){role=null;selRoom=null;view="day";if(poll){clearInterval(poll);poll=null;}document.getElementById("app-wrap").style.display="none";renderLogin();}
(async()=>{try{await seedIfEmpty();await loadAll();}catch(e){console.error(e);}document.getElementById("loading").style.display="none";renderLogin();})();
</script>
</body>
</html>
